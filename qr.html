<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Gerador de QR Code com download em PNG e anúncios Google AdSense." />
  <title>Gerador de QR Code</title>
  <link rel="icon" href="favicon.png" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=SEU-ID-ADSENSE" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <header class="hero">
      <p class="eyebrow">QR Code</p>
      <h1>Gerador de QR Code dedicado</h1>
      <p class="subline">Insira texto ou URLs, gere e baixe QR Codes com um clique.</p>
      <div class="hero-actions">
        <a class="secondary" href="index.html">Voltar ao hub</a>
      </div>
    </header>

    <div class="adsense ad-top">
      <ins class="adsbygoogle"
        style="display:block"
        data-ad-format="auto"
        data-full-width-responsive="true"
        data-ad-client="SEU-ID-ADSENSE"
        data-ad-slot="1234567890"></ins>
    </div>

    <main class="tool-card">
      <div class="tool-header">
        <h2>QR Code instantâneo</h2>
        <p>QR Code local, sem envio para servidores externos.</p>
      </div>
      <form id="qrForm" class="tool-form">
        <label class="input-label" for="qrInput">Texto ou URL</label>
        <textarea id="qrInput" placeholder="https://seusite.com" rows="3"></textarea>
        <button type="submit" class="primary">Gerar QR Code</button>
      </form>

      <div class="qr-section">
        <div id="qrcode" class="qr-code" aria-live="polite"></div>
        <div class="qr-actions">
          <button id="downloadBtn" class="secondary" disabled>Baixar QR Code</button>
          <p id="status" class="status">Insira texto para gerar o QR Code.</p>
        </div>
      </div>

      <div class="adsense ad-tool">
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-format="auto"
          data-full-width-responsive="true"
          data-ad-client="SEU-ID-ADSENSE"
          data-ad-slot="1234567890"></ins>
      </div>
    </main>

    <footer class="footer">
      <p>QR Code gerado apenas no seu navegador.</p>
      <div class="adsense ad-footer">
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-format="auto"
          data-full-width-responsive="true"
          data-ad-client="SEU-ID-ADSENSE"
          data-ad-slot="1234567890"></ins>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
