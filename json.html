<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Formatador e validador de JSON escrito no navegador com botões de cópia." />
  <title>Formatador de JSON</title>
  <link rel="icon" href="favicon.png" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=SEU-ID-ADSENSE" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <header class="hero">
      <p class="eyebrow">JSON</p>
      <h1>Formatador e validador de JSON</h1>
      <p class="subline">Cole JSON bruto e formate com identação automática.</p>
      <div class="hero-actions">
        <a class="secondary" href="index.html">Voltar ao hub</a>
      </div>
    </header>

    <div class="adsense ad-top">
      <ins class="adsbygoogle"
        style="display:block"
        data-ad-format="auto"
        data-full-width-responsive="true"
        data-ad-client="SEU-ID-ADSENSE"
        data-ad-slot="1234567890"></ins>
    </div>

    <main class="tool-card">
      <div class="tool-header">
        <h2>Validação instantânea</h2>
        <p>Mensagens de erro ajudam a corrigir JSON inválido.</p>
      </div>

      <textarea id="jsonInput" rows="5" placeholder="Cole o JSON cru aqui"></textarea>
      <div class="tool-actions">
        <button type="button" id="formatJson" class="primary">Formatar JSON</button>
        <button type="button" id="copyJson" class="secondary" disabled>Copiar resultado</button>
      </div>

      <p id="jsonStatus" class="status">Formato válido aparecerá no campo abaixo.</p>
      <textarea id="jsonOutput" rows="6" readonly placeholder="Resultado formatado"></textarea>

      <div class="adsense ad-tool">
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-format="auto"
          data-full-width-responsive="true"
          data-ad-client="SEU-ID-ADSENSE"
          data-ad-slot="1234567890"></ins>
      </div>
    </main>

    <footer class="footer">
      <p>JSON é validado localmente para preservar privacidade.</p>
      <div class="adsense ad-footer">
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-format="auto"
          data-full-width-responsive="true"
          data-ad-client="SEU-ID-ADSENSE"
          data-ad-slot="1234567890"></ins>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
