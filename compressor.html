<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Compressor de imagem com controle de qualidade e preview de tamanho final." />
  <title>Compressor de imagem</title>
  <link rel="icon" href="favicon.png" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=SEU-ID-ADSENSE" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <header class="hero">
      <p class="eyebrow">Compressor</p>
      <h1>Compressor de imagem</h1>
      <p class="subline">Carregue foto, ajuste a qualidade e baixe uma versão mais leve.</p>
      <div class="hero-actions">
        <a class="secondary" href="index.html">Voltar ao hub</a>
      </div>
    </header>

    <div class="adsense ad-top">
      <ins class="adsbygoogle"
        style="display:block"
        data-ad-format="auto"
        data-full-width-responsive="true"
        data-ad-client="SEU-ID-ADSENSE"
        data-ad-slot="1234567890"></ins>
    </div>

    <main class="tool-card">
      <div class="tool-header">
        <h2>Reduza o tamanho da imagem</h2>
        <p>Preview mostra a diferença entre original e comprimido.</p>
      </div>

      <form class="tool-form">
        <label class="input-label" for="compressorFile">Imagem</label>
        <input type="file" id="compressorFile" accept="image/*" />
        <label class="input-label" for="compressorQuality">Qualidade (10% a 100%)</label>
        <input type="range" id="compressorQuality" min="0.1" max="1" step="0.05" value="0.85" />
        <p class="status" id="compressorQualityValue">Qualidade: 85%</p>
        <button type="button" id="compressImage" class="primary">Comprimir imagem</button>
      </form>

      <div class="image-preview" id="compressorPreview">
        <p class="status">Envie uma imagem para ver o preview.</p>
      </div>

      <div class="tool-actions">
        <button type="button" id="downloadCompressor" class="secondary" disabled>Baixar imagem comprimida</button>
      </div>

      <div class="adsense ad-tool">
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-format="auto"
          data-full-width-responsive="true"
          data-ad-client="SEU-ID-ADSENSE"
          data-ad-slot="1234567890"></ins>
      </div>
    </main>

    <footer class="footer">
      <p>Compressão feita no navegador; nada é enviado.</p>
      <div class="adsense ad-footer">
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-format="auto"
          data-full-width-responsive="true"
          data-ad-client="SEU-ID-ADSENSE"
          data-ad-slot="1234567890"></ins>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
