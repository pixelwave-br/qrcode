<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Gerador de UUID v4 preparado para integrar APIs e bancos de dados." />
  <title>Gerador de UUID</title>
  <link rel="icon" href="favicon.png" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=SEU-ID-ADSENSE" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <header class="hero">
      <p class="eyebrow">UUID v4</p>
      <h1>Gerador de UUID único</h1>
      <p class="subline">UUIDs prontos para APIs, sistemas ou bancos de dados.</p>
      <div class="hero-actions">
        <a class="secondary" href="index.html">Voltar ao hub</a>
      </div>
    </header>

    <div class="adsense ad-top">
      <ins class="adsbygoogle"
        style="display:block"
        data-ad-format="auto"
        data-full-width-responsive="true"
        data-ad-client="SEU-ID-ADSENSE"
        data-ad-slot="1234567890"></ins>
    </div>

    <main class="tool-card">
      <div class="tool-header">
        <h2>UUID pronto</h2>
        <p>Geração local com Crypto API ou fallback manual.</p>
      </div>

      <div class="tool-actions">
        <button type="button" id="uuidBtn" class="primary">Gerar UUID v4</button>
        <button type="button" id="copyUUID" class="secondary" disabled>Copiar UUID</button>
      </div>

      <div class="tool-output">
        <input type="text" id="uuidOutput" readonly placeholder="UUID aparecerá aqui" />
      </div>

      <div class="adsense ad-tool">
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-format="auto"
          data-full-width-responsive="true"
          data-ad-client="SEU-ID-ADSENSE"
          data-ad-slot="1234567890"></ins>
      </div>
    </main>

    <footer class="footer">
      <p>UUIDs são gerados localmente sem qualquer envio adicional.</p>
      <div class="adsense ad-footer">
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-format="auto"
          data-full-width-responsive="true"
          data-ad-client="SEU-ID-ADSENSE"
          data-ad-slot="1234567890"></ins>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
